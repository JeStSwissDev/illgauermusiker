<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Formation erfassen</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { font-family: system-ui, sans-serif; max-width: 980px; margin: 24px auto; padding: 0 16px; }
    .card { border:1px solid var(--border); border-radius: 12px; padding: 16px; margin: 12px 0; }
    label { display:block; margin-top: 10px; }
    input, textarea, select { width: 100%; padding: 8px; margin-top: 4px; }
    .row { display:flex; gap: 10px; }
    .row > * { flex:1; }
    button { padding: 10px 12px; }
    table { width:100%; border-collapse: collapse; }
    th, td { border-bottom:1px solid rgba(127, 103, 79, 0.18); padding: 8px; vertical-align: top; }
    .muted { color:var(--muted); }
    .inline { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  </style>
</head>
<body>
  <h1 id="pageTitle">Formation erfassen</h1>
  <p class="muted"><a href="/">Zur Startseite</a></p>

  <form id="form" class="card">
    <label>Name *</label>
    <input name="name" required />

    <div class="row">
      <div>
        <label>Gründungsdatum *</label>
        <input type="text" name="gruendungsdatum" required placeholder="TT.MM.JJJJ" />
      </div>
      <div>
        <label>Auflösungsdatum</label>
        <input type="text" name="aufloesungsdatum" placeholder="TT.MM.JJJJ" />
      </div>
    </div>

    <label>Biografie</label>
    <textarea name="biografie" rows="6"></textarea>

    <label>Foto</label>
    <input type="file" name="foto" accept="image/*" />
    <label class="inline" id="removeFotoWrap" hidden>
      <input type="checkbox" id="removeFoto" style="width:auto; margin:0;" />
      <span>Bestehendes Foto entfernen</span>
    </label>

    <label>MP3</label>
    <input type="file" name="mp3" accept="audio/mpeg,audio/mp3" />
    <label class="inline" id="removeMp3Wrap" hidden>
      <input type="checkbox" id="removeMp3" style="width:auto; margin:0;" />
      <span>Bestehende MP3 entfernen</span>
    </label>

    <div class="card">
      <h2>Genres</h2>
      <select id="genres" multiple size="8"></select>
      <p class="muted">Mehrfachauswahl: Ctrl/Shift (Windows) / Cmd (Mac)</p>
    </div>

    <div class="card">
      <h2>Mitglieder + Zeitraum</h2>
      <table>
        <thead>
          <tr>
            <th>Musiker</th>
            <th>Eintritt *</th>
            <th>Austritt</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="mitglieder"></tbody>
      </table>
      <button type="button" id="addMember">+ Musiker hinzufügen</button>
    </div>

    <div class="inline">
      <button type="submit" id="saveBtn">Speichern</button>
      <button type="button" id="cancelBtn" hidden>Abbrechen</button>
      <button type="button" id="deleteBtn" hidden>Löschen</button>
    </div>
  </form>

  <pre id="out" class="card"></pre>

<script>
  const out = document.getElementById("out");
  const form = document.getElementById("form");
  const tb = document.getElementById("mitglieder");
  const selGenres = document.getElementById("genres");
  const pageTitle = document.getElementById("pageTitle");
  const saveBtn = document.getElementById("saveBtn");
  const cancelBtn = document.getElementById("cancelBtn");
  const deleteBtn = document.getElementById("deleteBtn");
  const removeFotoWrap = document.getElementById("removeFotoWrap");
  const removeMp3Wrap = document.getElementById("removeMp3Wrap");
  const removeFoto = document.getElementById("removeFoto");
  const removeMp3 = document.getElementById("removeMp3");
  const editId = new URLSearchParams(location.search).get("id");
  let musiker = [];
  bindDateField(form.gruendungsdatum);
  bindDateField(form.aufloesungsdatum);

  function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

  function asDate(v){ return v ? String(v).slice(0, 10) : ""; }
  function isoToDisplay(v) {
    const iso = asDate(v);
    if (!iso) return "";
    const [y, m, d] = iso.split("-");
    return [d, m, y].join(".");
  }
  function displayToIso(v) {
    const value = String(v || "").trim();
    if (!value) return "";
    if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
    const m = value.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
    if (!m) return "";
    const day = m[1].padStart(2, "0");
    const month = m[2].padStart(2, "0");
    return `${m[3]}-${month}-${day}`;
  }
  function setDateField(input, value) {
    input.value = isoToDisplay(value);
  }
  function getDateField(input) {
    return displayToIso(input.value);
  }
  function bindDateField(input) {
    input.setAttribute("placeholder", "TT.MM.JJJJ");
    input.setAttribute("inputmode", "numeric");
    input.addEventListener("blur", () => {
      const iso = getDateField(input);
      if (input.value && !iso) {
        input.setCustomValidity("Bitte Datum im Format TT.MM.JJJJ eingeben.");
      } else {
        input.setCustomValidity("");
        if (iso) input.value = isoToDisplay(iso);
      }
    });
    input.addEventListener("input", () => input.setCustomValidity(""));
  }

  async function loadLookups() {
    musiker = await fetch("/api/lookups/musiker").then(r=>r.json());
    const genres = await fetch("/api/lookups/genres").then(r=>r.json());
    selGenres.innerHTML = genres.map(g => `<option value="${g.id}">${esc(g.name)}</option>`).join("");
  }

  function addMemberRow(data = {}) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>
        <select class="musiker">
          <option value="">-- wählen --</option>
          ${musiker.map(m => `<option value="${m.id}">${esc(m.nachname)}, ${esc(m.vorname)}</option>`).join("")}
        </select>
      </td>
      <td><input type="text" class="eintritt date-input" placeholder="TT.MM.JJJJ" /></td>
      <td><input type="text" class="austritt date-input" placeholder="TT.MM.JJJJ" /></td>
      <td><button type="button" class="del">Entfernen</button></td>
    `;
    tr.querySelector(".musiker").value = data.musiker_id ? String(data.musiker_id) : "";
    bindDateField(tr.querySelector(".eintritt"));
    bindDateField(tr.querySelector(".austritt"));
    setDateField(tr.querySelector(".eintritt"), data.eintrittsdatum);
    setDateField(tr.querySelector(".austritt"), data.austrittsdatum);
    tr.querySelector(".del").addEventListener("click", () => tr.remove());
    tb.appendChild(tr);
  }

  async function loadEditData() {
    if (!editId) {
      addMemberRow();
      return;
    }

    const resp = await fetch(`/api/formation/${editId}`);
    const data = await resp.json();
    if (!resp.ok) {
      out.textContent = JSON.stringify(data, null, 2);
      return;
    }

    pageTitle.textContent = "Formation bearbeiten";
    saveBtn.textContent = "Änderungen speichern";
    cancelBtn.hidden = false;
    deleteBtn.hidden = false;

    form.name.value = data.name || "";
    setDateField(form.gruendungsdatum, data.gruendungsdatum);
    setDateField(form.aufloesungsdatum, data.aufloesungsdatum);
    form.biografie.value = data.biografie || "";

    const genreIds = new Set((data.genres || []).map(g => String(g.id)));
    Array.from(selGenres.options).forEach(opt => { opt.selected = genreIds.has(opt.value); });

    tb.innerHTML = "";
    if (data.mitglieder?.length) {
      data.mitglieder.forEach(m => addMemberRow({
        musiker_id: m.id,
        eintrittsdatum: m.eintrittsdatum,
        austrittsdatum: m.austrittsdatum,
      }));
    } else {
      addMemberRow();
    }

    removeFotoWrap.hidden = !data.foto_path;
    removeMp3Wrap.hidden = !data.mp3_path;
  }

  document.getElementById("addMember").addEventListener("click", () => addMemberRow());

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const requiredDatesOk = getDateField(form.gruendungsdatum);
    const optionalDateOk = !form.aufloesungsdatum.value || getDateField(form.aufloesungsdatum);
    if (!requiredDatesOk || !optionalDateOk) {
      out.textContent = "Bitte Datumsfelder im Format TT.MM.JJJJ ausfüllen.";
      form.reportValidity();
      return;
    }

    out.textContent = "Sende…";

    const fd = new FormData(form);
    fd.set("gruendungsdatum", getDateField(form.gruendungsdatum));
    fd.set("aufloesungsdatum", getDateField(form.aufloesungsdatum));
    const genreIds = Array.from(selGenres.selectedOptions).map(o => Number(o.value));
    fd.set("genre_ids", JSON.stringify(genreIds));

    const members = Array.from(tb.querySelectorAll("tr")).map(tr => ({
      musiker_id: tr.querySelector(".musiker").value ? Number(tr.querySelector(".musiker").value) : null,
      eintrittsdatum: getDateField(tr.querySelector(".eintritt")) || null,
      austrittsdatum: getDateField(tr.querySelector(".austritt")) || null,
    })).filter(x => x.musiker_id && x.eintrittsdatum);

    fd.set("mitglieder", JSON.stringify(members));
    fd.set("remove_foto", removeFoto.checked ? "1" : "0");
    fd.set("remove_mp3", removeMp3.checked ? "1" : "0");

    const url = editId ? `/api/formation/${editId}` : "/api/formation";
    const method = editId ? "PUT" : "POST";
    const resp = await fetch(url, { method, body: fd });
    const json = await resp.json();
    out.textContent = JSON.stringify(json, null, 2);

    if (resp.ok) {
      const id = json?.formation?.id || editId;
      const go = confirm(editId ? "Änderungen gespeichert. Zur Formation-Ansicht wechseln?" : "Erfolgreich gespeichert. Zur Formation-Ansicht wechseln?");
      if (go) location.href = `/?type=formation&id=${id}`;
    }
  });

  cancelBtn.addEventListener("click", () => {
    if (editId) location.href = `/?type=formation&id=${editId}`;
    else form.reset();
  });

  deleteBtn.addEventListener("click", async () => {
    if (!editId) return;
    if (!confirm("Diese Formation wirklich löschen?")) return;
    const resp = await fetch(`/api/formation/${editId}`, { method: "DELETE" });
    const json = await resp.json();
    out.textContent = JSON.stringify(json, null, 2);
    if (resp.ok) location.href = "/";
  });

  (async () => {
    await loadLookups();
    await loadEditData();
  })();
</script>
</body>
</html>

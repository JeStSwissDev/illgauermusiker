<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Formation erfassen</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 980px; margin: 24px auto; padding: 0 16px; }
    .card { border:1px solid #ddd; border-radius: 12px; padding: 16px; margin: 12px 0; }
    label { display:block; margin-top: 10px; }
    input, textarea, select { width: 100%; padding: 8px; margin-top: 4px; }
    .row { display:flex; gap: 10px; }
    .row > * { flex:1; }
    button { padding: 10px 12px; }
    table { width:100%; border-collapse: collapse; }
    th, td { border-bottom:1px solid #eee; padding: 8px; vertical-align: top; }
    .muted { color:#666; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; }
    .preview { max-width:220px; border-radius:12px; margin-top:8px; display:block; }
    .danger { background:#a40000; color:#fff; border:none; }
  </style>
</head>
<body>
  <h1 id="pageTitle">Formation erfassen</h1>
  <p class="muted"><a href="/">Zur Startseite</a></p>

  <form id="form" class="card">
    <label>Name *</label>
    <input name="name" required />

    <div class="row">
      <div>
        <label>Gründungsdatum *</label>
        <input type="date" name="gruendungsdatum" required />
      </div>
      <div>
        <label>Auflösungsdatum</label>
        <input type="date" name="aufloesungsdatum" />
      </div>
    </div>

    <label>Biografie</label>
    <textarea name="biografie" rows="6"></textarea>

    <label>Foto</label>
    <input type="file" name="foto" accept="image/*" />
    <div id="fotoArea" style="display:none;">
      <p class="muted">Aktuelles Foto:</p>
      <img id="fotoPreview" class="preview" alt="Aktuelles Foto" />
      <label><input type="checkbox" id="removeFoto" /> Bestehendes Foto entfernen</label>
    </div>

    <label>MP3</label>
    <input type="file" name="mp3" accept="audio/mpeg,audio/mp3" />
    <div id="mp3Area" style="display:none;">
      <p class="muted">Aktuelle MP3:</p>
      <audio id="mp3Preview" controls style="width:100%;"></audio>
      <label><input type="checkbox" id="removeMp3" /> Bestehende MP3 entfernen</label>
    </div>

    <div class="card">
      <h2>Genres</h2>
      <select id="genres" multiple size="8"></select>
      <p class="muted">Mehrfachauswahl: Ctrl/Shift (Windows) / Cmd (Mac)</p>
    </div>

    <div class="card">
      <h2>Mitglieder + Zeitraum</h2>
      <table>
        <thead>
          <tr>
            <th>Musiker</th>
            <th>Eintritt *</th>
            <th>Austritt</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="mitglieder"></tbody>
      </table>
      <button type="button" id="addMember">+ Musiker hinzufügen</button>
    </div>

    <div class="actions">
      <button type="submit" id="saveBtn">Speichern</button>
      <button type="button" id="deleteBtn" class="danger" style="display:none;">Formation löschen</button>
    </div>
  </form>

  <pre id="out" class="card"></pre>

<script>
  const out = document.getElementById("out");
  const tb = document.getElementById("mitglieder");
  const selGenres = document.getElementById("genres");
  const params = new URLSearchParams(location.search);
  const editId = params.get("id");
  const isEdit = !!editId;
  let musiker = [];

  function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

  function setSelectedValues(select, ids) {
    const set = new Set((ids || []).map(Number));
    Array.from(select.options).forEach(o => o.selected = set.has(Number(o.value)));
  }

  async function loadLookups() {
    const [musikerData, genres] = await Promise.all([
      fetch("/api/lookups/musiker").then(r=>r.json()),
      fetch("/api/lookups/genres").then(r=>r.json())
    ]);

    musiker = musikerData;
    selGenres.innerHTML = genres.map(g => `<option value="${g.id}">${esc(g.name)}</option>`).join("");

    if (isEdit) {
      await loadExisting();
    } else {
      addMemberRow();
    }
  }

  function addMemberRow(data = {}) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>
        <select class="musiker">
          <option value="">-- wählen --</option>
          ${musiker.map(m => `<option value="${m.id}">${esc(m.nachname)}, ${esc(m.vorname)}</option>`).join("")}
        </select>
      </td>
      <td><input type="date" class="eintritt" /></td>
      <td><input type="date" class="austritt" /></td>
      <td><button type="button" class="del">Entfernen</button></td>
    `;
    tr.querySelector(".musiker").value = data.id || data.musiker_id || "";
    tr.querySelector(".eintritt").value = data.eintrittsdatum || "";
    tr.querySelector(".austritt").value = data.austrittsdatum || "";
    tr.querySelector(".del").addEventListener("click", () => tr.remove());
    tb.appendChild(tr);
  }

  async function loadExisting() {
    document.getElementById("pageTitle").textContent = "Formation bearbeiten";
    document.getElementById("saveBtn").textContent = "Änderungen speichern";
    document.getElementById("deleteBtn").style.display = "inline-block";

    const res = await fetch(`/api/formation/${encodeURIComponent(editId)}`);
    const data = await res.json();
    if (!res.ok) {
      out.textContent = JSON.stringify(data, null, 2);
      return;
    }

    form.name.value = data.name || "";
    form.gruendungsdatum.value = data.gruendungsdatum || "";
    form.aufloesungsdatum.value = data.aufloesungsdatum || "";
    form.biografie.value = data.biografie || "";
    setSelectedValues(selGenres, (data.genres || []).map(g => g.id));

    tb.innerHTML = "";
    (data.mitglieder || []).forEach(addMemberRow);
    if (!data.mitglieder?.length) addMemberRow();

    if (data.foto_path) {
      document.getElementById("fotoArea").style.display = "block";
      document.getElementById("fotoPreview").src = `/${data.foto_path}`;
    }
    if (data.mp3_path) {
      document.getElementById("mp3Area").style.display = "block";
      document.getElementById("mp3Preview").src = `/${data.mp3_path}`;
    }
  }

  document.getElementById("addMember").addEventListener("click", () => addMemberRow());

  document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();
    out.textContent = "Sende…";

    const fd = new FormData(e.target);
    const genreIds = Array.from(selGenres.selectedOptions).map(o => Number(o.value));
    fd.append("genre_ids", JSON.stringify(genreIds));

    const members = Array.from(tb.querySelectorAll("tr")).map(tr => ({
      musiker_id: tr.querySelector(".musiker").value ? Number(tr.querySelector(".musiker").value) : null,
      eintrittsdatum: tr.querySelector(".eintritt").value || null,
      austrittsdatum: tr.querySelector(".austritt").value || null,
    })).filter(x => x.musiker_id && x.eintrittsdatum);

    fd.append("mitglieder", JSON.stringify(members));
    if (document.getElementById("removeFoto").checked) fd.append("remove_foto", "1");
    if (document.getElementById("removeMp3").checked) fd.append("remove_mp3", "1");

    const url = isEdit ? `/api/formation/${encodeURIComponent(editId)}` : "/api/formation";
    const method = isEdit ? "PUT" : "POST";

    const resp = await fetch(url, { method, body: fd });
    const json = await resp.json();
    out.textContent = JSON.stringify(json, null, 2);

    if (resp.ok) {
      const targetId = json?.formation?.id || editId;
      const go = confirm(isEdit ? "Änderungen gespeichert. Zur Formation-Ansicht wechseln?" : "Erfolgreich gespeichert. Zur Formation-Ansicht wechseln?");
      if (go) location.href = `/?type=formation&id=${targetId}`;
      else if (!isEdit) e.target.reset();
    }
  });

  document.getElementById("deleteBtn").addEventListener("click", async () => {
    if (!confirm("Diese Formation wirklich löschen?")) return;
    const resp = await fetch(`/api/formation/${encodeURIComponent(editId)}`, { method: "DELETE" });
    const json = await resp.json();
    out.textContent = JSON.stringify(json, null, 2);
    if (resp.ok) {
      alert("Formation gelöscht.");
      location.href = "/";
    }
  });

  const form = document.getElementById("form");
  loadLookups();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Illgauer Musikarchiv</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    h1 { margin-bottom: 30px; }
    h2 { margin-top: 40px; }
    ul { line-height: 1.8; }
    a { text-decoration: none; color: #0a58ca; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<h1>Illgauer Musikarchiv</h1>

<h2>Formationen</h2>
<ul id="formationen"></ul>

<h2>Musiker</h2>
<ul id="musiker"></ul>

<script>
async function loadFormationen() {
  const res = await fetch("/api/lookups/formationen");
  const data = await res.json();

  const ul = document.getElementById("formationen");

  data.forEach(f => {
    const li = document.createElement("li");
    li.innerHTML = `<a href="/api/formation/${f.id}">${f.name}</a>`;
    ul.appendChild(li);
  });
}

async function loadMusiker() {
  const res = await fetch("/api/lookups/musiker");
  const data = await res.json();

  const ul = document.getElementById("musiker");

  data.forEach(m => {
    const name = `${m.nachname} ${m.vorname}`;
    const li = document.createElement("li");
    li.innerHTML = `<a href="/api/musiker/${m.id}">${name}</a>`;
    ul.appendChild(li);
  });
}

loadFormationen();
loadMusiker();
</script>

</body>
</html>

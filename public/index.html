<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Musikwelt Illgau</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 16px; }
    .card { border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin: 12px 0; }
    img { max-width: 320px; border-radius: 12px; }
    a { text-decoration: none; }
    ul { list-style: none; margin: 8px 0 0 0; padding: 0; }
    li { padding: 2px 0; }
    .muted { color: var(--muted); }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 12px; }
    .danger { background:var(--danger); color:#fff; border:none; }
    .admin-links { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    button { padding:10px 12px; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <h1><a href="/">Musikwelt Illgau</a></h1>

  <div class="toolbar">
    <button type="button" id="logoutBtn">Logout</button>
    <button id="qrBtn" type="button">QR-Code</button>
  </div>

  <div id="adminNav" class="card" style="display:none;">
    <strong>Erfassungsbereich</strong>
    <div class="admin-links">
      <a href="/add-musiker.html">Musiker erfassen</a>
      <a href="/add-formation.html">Formation erfassen</a>
      <a href="/add-instrument.html">Instrumente verwalten</a>
      <a href="/add-genre.html">Genres verwalten</a>
    </div>
  </div>

  <div id="qrWrap" class="card" style="display:none;">
    <h3>QR-Code</h3>
    <div id="qrcode"></div>
    <p class="muted"><span id="qrUrl"></span></p>
    <button id="qrClose" type="button">Schliessen</button>
  </div>

  <div id="content" class="card">Lade…</div>

<script>
  const params = new URLSearchParams(location.search);
  const type = params.get("type");
  const id = params.get("id");
  let isAuthenticated = false;

  function linkTo(t, i, label) {
    return `<a href="/?type=${encodeURIComponent(t)}&id=${encodeURIComponent(i)}">${label}</a>`;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function formatDate(value) {
    const iso = value ? String(value).slice(0, 10) : "";
    if (!iso) return "";
    const [y, m, d] = iso.split("-").map(Number);
    const date = new Date(y, m - 1, d);
    return new Intl.DateTimeFormat("de-CH", {
      day: "numeric",
      month: "long",
      year: "numeric"
    }).format(date);
  }

  function formatDateRange(from, to) {
    const start = formatDate(from);
    if (!start) return to ? formatDate(to) : "";
    return `${start}${to ? " – " + formatDate(to) : " – aktiv"}`;
  }

  function adminActionsHtml() {
    if (!isAuthenticated || !type || !id) return "";
    const editUrl = type === "musiker"
      ? `/add-musiker.html?id=${encodeURIComponent(id)}`
      : `/add-formation.html?id=${encodeURIComponent(id)}`;

    return `
      <div class="admin-links">
        <a href="${editUrl}">Bearbeiten</a>
        <button type="button" class="danger" id="deleteObjectBtn">Löschen</button>
      </div>
    `;
  }

  async function deleteCurrentObject() {
    if (!type || !id) return;
    const label = type === "musiker" ? "diesen Musiker" : "diese Formation";
    if (!confirm(`Willst du ${label} wirklich löschen?`)) return;

    const resp = await fetch(`/api/${type}/${encodeURIComponent(id)}`, {
      method: "DELETE",
      credentials: "include"
    });
    const json = await resp.json();

    if (resp.ok) {
      alert("Objekt gelöscht.");
      location.href = "/";
    } else {
      alert(json.error || json.message || "Löschen fehlgeschlagen.");
    }
  }

  function bindAdminActions() {
    document.getElementById("deleteObjectBtn")?.addEventListener("click", deleteCurrentObject);
  }

  async function loadStartPage() {
    const [formationenRes, musikerRes] = await Promise.all([
      fetch("/api/lookups/formationen"),
      fetch("/api/lookups/musiker")
    ]);

    const formationen = await formationenRes.json();
    const musiker = await musikerRes.json();

    document.getElementById("content").innerHTML = `
      <h2>Formationen</h2>
      ${formationen?.length
        ? `<ul>${formationen.map(f => `<li>${linkTo("formation", f.id, escapeHtml(f.name))}</li>`).join("")}</ul>`
        : `<p class="muted">Keine Formationen erfasst</p>`}

      <h2 class="section-gap">Musiker</h2>
      ${musiker?.length
        ? `<ul>${musiker.map(m => `<li>${linkTo("musiker", m.id, escapeHtml(m.nachname + " " + m.vorname))}</li>`).join("")}</ul>`
        : `<p class="muted">Keine Musiker erfasst</p>`}
    `;
  }

  async function loadDetailPage() {
    const res = await fetch(`/api/${type}/${id}`);
    const data = await res.json();

    if (!res.ok) {
      document.getElementById("content").innerHTML = `<h2>Fehler</h2><pre>${JSON.stringify(data, null, 2)}</pre>`;
      return;
    }

    if (type === "musiker") {
      const name = `${data.vorname} ${data.nachname}`;
      document.getElementById("content").innerHTML = `
        <h2>${name}</h2>
        ${adminActionsHtml()}
        ${data.foto_path ? `<img src="/${data.foto_path}" alt="${name}">` : ""}
        ${data.biografie ? `<p>${escapeHtml(data.biografie)}</p>` : ""}
        <p><strong>Geburtsdatum:</strong> ${formatDate(data.geburtsdatum)}</p>
        ${data.todesdatum ? `<p><strong>Todesdatum:</strong> ${formatDate(data.todesdatum)}</p>` : ""}

        <div class="card">
          <h3>Instrumente</h3>
          ${data.instrumente?.length ? `<ul>${data.instrumente.map(i => `<li>${escapeHtml(i.name)}</li>`).join("")}</ul>` : "<p class='muted'>Keine erfasst</p>"}
        </div>

        <div class="card">
          <h3>Formationen</h3>
          ${data.formationen?.length ? `<ul>${data.formationen.map(f => `<li>${linkTo("formation", f.id, escapeHtml(f.name))} <span class="muted">(${formatDateRange(f.eintrittsdatum, f.austrittsdatum)})</span></li>`).join("")}</ul>` : "<p class='muted'>Keine erfasst</p>"}
        </div>

        <div class="card">
          <h3>Macht Musik mit ${name}</h3>
          ${data.machtMusikMit?.length ? `<ul>${data.machtMusikMit.map(m => `<li>${linkTo("musiker", m.id, escapeHtml(m.vorname + " " + m.nachname))}</li>`).join("")}</ul>` : "<p class='muted'>Keine Einträge</p>"}
        </div>
      `;
    }

    if (type === "formation") {
      const name = data.name;
      document.getElementById("content").innerHTML = `
        <h2>${escapeHtml(name)}</h2>
        ${adminActionsHtml()}
        ${data.foto_path ? `<img src="/${data.foto_path}" alt="${escapeHtml(name)}">` : ""}
        ${data.biografie ? `<p>${escapeHtml(data.biografie)}</p>` : ""}
        <p><strong>Gründung:</strong> ${formatDate(data.gruendungsdatum)}</p>
        ${data.aufloesungsdatum ? `<p><strong>Auflösung:</strong> ${formatDate(data.aufloesungsdatum)}</p>` : ""}

        ${data.mp3_path ? `<audio controls src="/${data.mp3_path}" style="width:100%"></audio>` : ""}

        <div class="card">
          <h3>Genres</h3>
          ${data.genres?.length ? `<ul>${data.genres.map(g => `<li>${escapeHtml(g.name)}</li>`).join("")}</ul>` : "<p class='muted'>Keine erfasst</p>"}
        </div>

        <div class="card">
          <h3>Mitglieder</h3>
          ${data.mitglieder?.length ? `<ul>${data.mitglieder.map(m => `<li>${linkTo("musiker", m.id, escapeHtml(m.vorname + " " + m.nachname))} <span class="muted">(${formatDateRange(m.eintrittsdatum, m.austrittsdatum)})</span></li>`).join("")}</ul>` : "<p class='muted'>Keine erfasst</p>"}
        </div>
      `;
    }

    bindAdminActions();
  }

  async function load() {
    if (!type || !id) {
      await loadStartPage();
      return;
    }
    await loadDetailPage();
  }

  const qrBtn = document.getElementById("qrBtn");
  const qrWrap = document.getElementById("qrWrap");
  const qrClose = document.getElementById("qrClose");
  const qrUrl = document.getElementById("qrUrl");
  const qrDiv = document.getElementById("qrcode");

  function showQr(url) {
    qrDiv.innerHTML = "";
    qrUrl.textContent = url;
    qrWrap.style.display = "block";
    new QRCode(qrDiv, { text: url, width: 220, height: 220 });
  }

  qrBtn?.addEventListener("click", () => {
    showQr(window.location.href);
  });

  qrClose?.addEventListener("click", () => {
    qrWrap.style.display = "none";
  });

  const logoutBtn = document.getElementById("logoutBtn");

  logoutBtn?.addEventListener("click", async () => {
    if (!confirm("Wirklich ausloggen?")) return;

    try {
      const res = await fetch("/api/logout", {
        method: "POST",
        credentials: "include"
      });

      if (res.ok) {
        alert("Erfolgreich ausgeloggt");
        window.location.href = "/";
      } else {
        alert("Logout fehlgeschlagen");
      }
    } catch (e) {
      alert("Fehler beim Logout");
    }
  });

  fetch("/api/me", { credentials: "include" })
    .then(r => r.json())
    .then(async d => {
      isAuthenticated = !!d.authenticated;
      if (!isAuthenticated) {
        document.getElementById("logoutBtn")?.remove();
      } else {
        document.getElementById("adminNav").style.display = "block";
      }
      await load();
    });

  (function () {
    const navKey = "mw-illgau-nav-direction";

    function getNavDirection(urlString) {
      const url = new URL(urlString, location.href);

      if (url.origin !== location.origin) return "";

      const type = url.searchParams.get("type");
      const id = url.searchParams.get("id");

      if (url.pathname === "/" && type === "formation" && id) return "left";
      if (url.pathname === "/" && type === "musiker" && id) return "right";
      if (
        url.pathname === "/" &&
        !type &&
        !id &&
        (location.pathname !== "/" || location.search)
      ) return "up";

      return "";
    }

    document.addEventListener("DOMContentLoaded", () => {
      const dir = sessionStorage.getItem(navKey);

      if (dir === "left") {
        document.body.classList.add("page-enter-from-right");
      } else if (dir === "right") {
        document.body.classList.add("page-enter-from-left");
      } else if (dir === "up") {
        document.body.classList.add("page-enter-from-bottom");
      }

      sessionStorage.removeItem(navKey);
    });

    document.addEventListener("click", (e) => {
      const a = e.target.closest("a");
      if (!a) return;
      if (!a.href) return;
      if (a.target === "_blank") return;
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      if (a.hasAttribute("download")) return;

      const dir = getNavDirection(a.href);
      if (!dir) return;

      e.preventDefault();

      let exitClass = "";
      if (dir === "left") exitClass = "page-exit-left";
      if (dir === "right") exitClass = "page-exit-right";
      if (dir === "up") exitClass = "page-exit-up";

      sessionStorage.setItem(navKey, dir);
      document.body.classList.add(exitClass);

      setTimeout(() => {
        location.href = a.href;
      }, 300);
    });
  })();
</script>
</body>
</html>

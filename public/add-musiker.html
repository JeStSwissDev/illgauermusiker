<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Musiker erfassen</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { max-width: 980px; margin: 24px auto; padding: 0 16px; }
    .card { border-radius: 12px; padding: 16px; margin: 12px 0; }
    label { display:block; margin-top: 10px; }
    input, textarea, select { width: 100%; padding: 8px; margin-top: 4px; }
    .row { display:flex; gap: 10px; }
    .row > * { flex:1; }
    button { padding: 10px 12px; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding: 8px; vertical-align: top; }
    .inline { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  </style>
</head>
<body>
  <h1 id="pageTitle">Musiker erfassen</h1>
  <p class="muted"><a href="/">Zur Startseite</a></p>

  <form id="form" class="card">
    <div class="row">
      <div>
        <label>Vorname *</label>
        <input name="vorname" required />
      </div>
      <div>
        <label>Nachname *</label>
        <input name="nachname" required />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Geburtsdatum *</label>
        <input type="date" name="geburtsdatum" required />
      </div>
      <div>
        <label>Todesdatum</label>
        <input type="date" name="todesdatum" />
      </div>
    </div>

    <label>Biografie</label>
    <textarea name="biografie" rows="6"></textarea>

    <label>Foto (Bilddatei)</label>
    <input type="file" name="foto" accept="image/*" />
    <label class="inline" id="removeFotoWrap" hidden>
      <input type="checkbox" id="removeFoto" style="width:auto; margin:0;" />
      <span>Bestehendes Foto entfernen</span>
    </label>

    <div class="card">
      <h2>Instrumente</h2>
      <select id="instrumente" multiple size="8"></select>
      <p class="muted">Mehrfachauswahl: Ctrl/Shift (Windows) / Cmd (Mac)</p>
    </div>

    <div class="card">
      <h2>Formationen + Zeitraum</h2>
      <table>
        <thead>
          <tr>
            <th>Formation</th>
            <th>Eintritt *</th>
            <th>Austritt</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="mitgliedschaften"></tbody>
      </table>
      <button type="button" id="addMs">+ Formation hinzufügen</button>
    </div>

    <div class="inline">
      <button type="submit" id="saveBtn">Speichern</button>
      <button type="button" id="cancelBtn" hidden>Abbrechen</button>
      <button type="button" id="deleteBtn" hidden>Löschen</button>
    </div>
  </form>

  <pre id="out" class="card"></pre>

<script>
  const out = document.getElementById("out");
  const form = document.getElementById("form");
  const msBody = document.getElementById("mitgliedschaften");
  const selInst = document.getElementById("instrumente");
  const pageTitle = document.getElementById("pageTitle");
  const saveBtn = document.getElementById("saveBtn");
  const cancelBtn = document.getElementById("cancelBtn");
  const deleteBtn = document.getElementById("deleteBtn");
  const removeFotoWrap = document.getElementById("removeFotoWrap");
  const removeFoto = document.getElementById("removeFoto");
  const editId = new URLSearchParams(location.search).get("id");
  let formationen = [];

  function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function asDate(v){ return v ? String(v).slice(0, 10) : ""; }

  async function loadLookups() {
    formationen = await fetch("/api/lookups/formationen").then(r=>r.json());
    const instrumente = await fetch("/api/lookups/instrumente").then(r=>r.json());
    selInst.innerHTML = instrumente.map(i => `<option value="${i.id}">${esc(i.name)}</option>`).join("");
  }

  function addMembershipRow(data = {}) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>
        <select class="formation">
          <option value="">-- wählen --</option>
          ${formationen.map(f => `<option value="${f.id}">${esc(f.name)}</option>`).join("")}
        </select>
      </td>
      <td><input type="date" class="eintritt" /></td>
      <td><input type="date" class="austritt" /></td>
      <td><button type="button" class="del">Entfernen</button></td>
    `;
    tr.querySelector(".formation").value = data.formation_id ? String(data.formation_id) : "";
    tr.querySelector(".eintritt").value = asDate(data.eintrittsdatum);
    tr.querySelector(".austritt").value = asDate(data.austrittsdatum);
    tr.querySelector(".del").addEventListener("click", () => tr.remove());
    msBody.appendChild(tr);
  }

  async function loadEditData() {
    if (!editId) {
      addMembershipRow();
      return;
    }

    const resp = await fetch(`/api/musiker/${editId}`);
    const data = await resp.json();
    if (!resp.ok) {
      out.textContent = JSON.stringify(data, null, 2);
      return;
    }

    pageTitle.textContent = "Musiker bearbeiten";
    saveBtn.textContent = "Änderungen speichern";
    cancelBtn.hidden = false;
    deleteBtn.hidden = false;

    form.vorname.value = data.vorname || "";
    form.nachname.value = data.nachname || "";
    form.geburtsdatum.value = asDate(data.geburtsdatum);
    form.todesdatum.value = asDate(data.todesdatum);
    form.biografie.value = data.biografie || "";

    const instIds = new Set((data.instrumente || []).map(i => String(i.id)));
    Array.from(selInst.options).forEach(opt => { opt.selected = instIds.has(opt.value); });

    msBody.innerHTML = "";
    if (data.formationen?.length) {
      data.formationen.forEach(f => addMembershipRow({
        formation_id: f.id,
        eintrittsdatum: f.eintrittsdatum,
        austrittsdatum: f.austrittsdatum,
      }));
    } else {
      addMembershipRow();
    }

    removeFotoWrap.hidden = !data.foto_path;
  }

  document.getElementById("addMs").addEventListener("click", () => addMembershipRow());

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    out.textContent = "Sende…";

    const fd = new FormData(form);
    const instIds = Array.from(selInst.selectedOptions).map(o => Number(o.value));
    fd.set("instrument_ids", JSON.stringify(instIds));

    const memberships = Array.from(msBody.querySelectorAll("tr")).map(tr => ({
      formation_id: tr.querySelector(".formation").value ? Number(tr.querySelector(".formation").value) : null,
      eintrittsdatum: tr.querySelector(".eintritt").value || null,
      austrittsdatum: tr.querySelector(".austritt").value || null,
    })).filter(x => x.formation_id && x.eintrittsdatum);
    fd.set("formationen", JSON.stringify(memberships));
    fd.set("remove_foto", removeFoto.checked ? "1" : "0");

    const url = editId ? `/api/musiker/${editId}` : "/api/musiker";
    const method = editId ? "PUT" : "POST";
    const resp = await fetch(url, { method, body: fd });
    const json = await resp.json();
    out.textContent = JSON.stringify(json, null, 2);

    if (resp.ok) {
      const id = json?.musiker?.id || editId;
      const go = confirm(editId ? "Änderungen gespeichert. Zur Musiker-Ansicht wechseln?" : "Erfolgreich gespeichert. Zur Musiker-Ansicht wechseln?");
      if (go) location.href = `/?type=musiker&id=${id}`;
    }
  });

  cancelBtn.addEventListener("click", () => {
    if (editId) location.href = `/?type=musiker&id=${editId}`;
    else form.reset();
  });

  deleteBtn.addEventListener("click", async () => {
    if (!editId) return;
    if (!confirm("Diesen Musiker wirklich löschen?")) return;
    const resp = await fetch(`/api/musiker/${editId}`, { method: "DELETE" });
    const json = await resp.json();
    out.textContent = JSON.stringify(json, null, 2);
    if (resp.ok) location.href = "/";
  });

  (async () => {
    await loadLookups();
    await loadEditData();
  })();
</script>
</body>
</html>

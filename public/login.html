<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login – Musikwelt Illgau</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { font-family: system-ui, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 16px; }
    .card { border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin: 12px 0; }
    input { width: 100%; padding: 10px; margin-top: 6px; }
    button { padding: 10px 12px; margin-top: 10px; }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <h1><a href="/" style="color:inherit;text-decoration:none;">Musikwelt Illgau</a></h1>

  <div class="card">
    <h2>Login</h2>
    <form id="loginForm">
      <label>Passwort</label>
      <input type="password" id="password" required />
      <button type="submit">Anmelden</button>
    </form>
    <p id="msg" class="muted"></p>
  </div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");
  msg.textContent = "Anmeldung läuft…";

  const resp = await fetch("/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password })
  });

  const json = await resp.json();

  if (resp.ok) {
    msg.textContent = "Erfolgreich angemeldet.";
    location.href = "/";
  } else {
    msg.textContent = json.error || "Login fehlgeschlagen.";
  }
});
</script>
</body>
</html>

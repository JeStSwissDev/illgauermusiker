<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Genre erfassen</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 16px; }
    .card { border:1px solid var(--border); border-radius: 12px; padding: 16px; margin: 12px 0; }
    input { width: 100%; padding: 10px; margin-top: 6px; }
    button { padding: 10px 12px; margin-top: 10px; }
    ul { list-style: none; margin: 8px 0 0 0; padding: 0; }
    li { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid rgba(127, 103, 79, 0.18); }
    .name { flex:1; }
    .actions { display:flex; gap:8px; flex-shrink:0; }
    .muted { color:var(--muted); }
  </style>
</head>
<body>
  <h1>Genre erfassen</h1>
  <p class="muted">
    <a href="/">Startseite</a> · <a href="/add-formation.html">Formation erfassen</a>
  </p>

  <form id="form" class="card">
    <label>Genre-Name *</label>
    <input name="name" required placeholder="z.B. Volksmusik, Rock, Chor..." />
    <button type="submit" id="saveBtn">Speichern</button>
    <button type="button" id="cancelBtn" hidden>Abbrechen</button>
  </form>

  <pre id="out" class="card"></pre>

  <div class="card">
    <h2>Vorhandene Genres</h2>
    <ul id="list"></ul>
  </div>

<script>
  const out = document.getElementById("out");
  const list = document.getElementById("list");
  const form = document.getElementById("form");
  const saveBtn = document.getElementById("saveBtn");
  const cancelBtn = document.getElementById("cancelBtn");
  let editId = null;

  function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

  function resetForm() {
    editId = null;
    form.reset();
    saveBtn.textContent = "Speichern";
    cancelBtn.hidden = true;
  }

  async function startEdit(id) {
    const data = await fetch(`/api/genre/${id}`).then(r => r.json());
    editId = id;
    form.name.value = data.name || "";
    saveBtn.textContent = "Änderungen speichern";
    cancelBtn.hidden = false;
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  async function removeItem(id, name) {
    if (!confirm(`Genre „${name}“ wirklich löschen?`)) return;
    const resp = await fetch(`/api/genre/${id}`, { method: "DELETE" });
    const json = await resp.json();
    out.textContent = JSON.stringify(json, null, 2);
    if (resp.ok) {
      if (editId === id) resetForm();
      await refresh();
      alert("Genre gelöscht.");
    }
  }

  async function refresh() {
    const data = await fetch("/api/genre").then(r => r.json());
    list.innerHTML = data.length
      ? data.map(g => `
          <li>
            <div class="actions">
              <button type="button" data-action="edit" data-id="${g.id}">Bearbeiten</button>
              <button type="button" data-action="delete" data-id="${g.id}" data-name="${esc(g.name)}">Löschen</button>
            </div>
            <div class="name">#${g.id} – ${esc(g.name)}</div>
          </li>
        `).join("")
      : "<li class='muted'>Noch keine Genres erfasst</li>";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    out.textContent = "Sende…";

    const name = e.target.name.value.trim();
    const url = editId ? `/api/genre/${editId}` : "/api/genre";
    const method = editId ? "PUT" : "POST";

    const resp = await fetch(url, {
      method,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name })
    });

    const json = await resp.json();
    out.textContent = JSON.stringify(json, null, 2);

    if (resp.ok) {
      resetForm();
      await refresh();
      alert("Genre gespeichert.");
    }
  });

  cancelBtn.addEventListener("click", resetForm);
  list.addEventListener("click", async (e) => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;
    const id = Number(btn.dataset.id);
    if (btn.dataset.action === "edit") await startEdit(id);
    if (btn.dataset.action === "delete") await removeItem(id, btn.dataset.name || "");
  });
  refresh();
</script>
</body>
</html>
